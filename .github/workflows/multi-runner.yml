# This name identifies the workflow in the GitHub Actions tab
name: self-hosted-runner

on:
  push:
    branches:
      - main # Triggers when you push to the main branch

# The 'jobs' block contains all the independent units of work
jobs:
  # JOB 1: Ubuntu Environment
  ubuntu-runner:
    runs-on: ubuntu-latest # Fixed the previous 'ubuntu-lates' typo
    steps:
      - name: Print OS 
        run: echo "This job is on ${{ runner.os }} operating system"

      - name: The runner's hostname
        # Only runs if the OS is NOT Windows
        if: runner.os != 'Windows'
        run: echo "Runner's host is: $(hostname)"

      - name: The current user running the job
        run: echo "The user running the job is ${{ github.actor }}"

  # JOB 2: Windows Environment (Indented exactly like ubuntu-runner)
  windows-runner: 
    runs-on: windows-latest
    steps:
      - name: Print OS
        run: echo "This job is running on ${{ runner.os }} operating system"

      - name: The runner's hostname
        # Only runs if the OS is exactly Windows
        if: runner.os == 'Windows'
        run: Write-Host "Hostname: $env:COMPUTERNAME"
        shell: powershell # Required to use Windows commands like Write-Host

      - name: The current user running the job
        run: echo "The user running the job is ${{ github.actor }}"

  # JOB 3: macOS Environment (Indented exactly like ubuntu-runner)
  macos-runner: 
    runs-on: macos-latest
    steps:
      - name: print os
        # Added space inside curly braces for best practice
        run: echo "This job is running on ${{ runner.os }} operating system"

      - name: The runner's hostname
        if: runner.os != 'Windows'
        run: echo "Runner's host is: $(hostname)"

      - name: The current user running the job 
        run: echo "The user running the job is ${{ github.actor }}"
