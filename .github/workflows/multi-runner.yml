name: self-hosted-runner

on:
  push:
    branches:
      - main

# The 'jobs:' keyword only appears ONCE
jobs:
  ubuntu-runner:
    runs-on: ubuntu-latest # Fixed typo: 'ubuntu-lates' to 'ubuntu-latest'
    steps:
      - name: Print OS 
        run: echo "This job is on ${{ runner.os }} operating system"

      - name: The runner's hostname
        if: runner.os != 'Windows'
        run: echo "Runner's host is: $(hostname)"

      - name: The current user running the job
        run: echo "The user running the job is ${{ github.actor }}"

  windows-runner: # No 'jobs:' keyword here
    runs-on: windows-latest
    steps:
      - name: Print OS
        run: echo "This job is running on ${{ runner.os }} operating system"

      - name: The runner's hostname
        if: runner.os == 'Windows'
        run: Write-Host "Hostname: $env:COMPUTERNAME"
        shell: powershell

      - name: The current user running the job
        run: echo "The user running the job is ${{ github.actor }}"

  macos-runner: # No 'jobs:' keyword here
    runs-on: macos-latest
    steps:
      - name: print os
        # Added missing space in ${{ runner.os }}
        run: echo "This job is running on ${{ runner.os }} operating system"

      - name: The runner's hostname
        if: runner.os != 'Windows'
        run: echo "Runner's host is: $(hostname)"

      - name: The current user running the job 
        run: echo "The user running the job is ${{ github.actor }}"
