name: matrix-strategy

on:
  push:
    branches:
      - main


jobs:
  matrix-strategy:
    runs-on: ${{matrix.os}}
    strategy:
      
      fail-fast: true


      matrix:
        python-version: ["3.10", "3.12", "3.14"]
        os: [ubuntu-latest, windows-latest]
      
      # exclude:
        # - python-version: 3.14
        # - os: windows-latest  


    steps: 
      - name: checkout repo
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: ${{matrix.python-version}}
      - name: print python version
        run: python --version

      - name: Trigger failure on Python 3.12
        if: matrix.python-version == '3.12'
        run: |
          echo "Simulating a failure on experimental version..."
          exit 1

  
