name: output-jobs

on:
  push:
    branches:
      - main

jobs:
  generate-date:
    runs-on: ubuntu-latest

    outputs:
     date_today: ${{steps.date_step.outputs.formatted_date}}

    steps:
    - name: Calculate Date
      id: date_step
      run: echo "formatted_date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

  read-date:
    runs-on: ubuntu-latest
    needs: generate-date

    steps:
    - name: print the date 
      run: echo "This passed date is ${{ needs.generate-date.outputs.date_today }}"
