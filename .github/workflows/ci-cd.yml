# Added git files
name: ci-cd

on:
  push:
    branches:
      - main

jobs:
  ci-cd-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: check repo for latest code
        uses: actions/checkout@v4

      # MOVE THIS UP
      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Always specify a version for consistency

      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: run the app
        run: python app.py
