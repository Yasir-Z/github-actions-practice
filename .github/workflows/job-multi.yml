name: multi-jobs

on:
  push:
    branches:
      - main

env:
  APP_NAME: myapp

jobs:
  multi-jobs:
    runs-on: ubuntu-latest
    
    env:
      ENVIRONMENT: staging

    steps: # This MUST be aligned with 'runs-on' and 'env' above
      - name: App name
        run: echo "Name of a is $APP_NAME"

      - name: App environment
        run: echo "App is running in Environment $ENVIRONMENT"

      - name: app version
        env:
          VERSION: 1.0.0
        run: echo "app Version is $VERSION"

      - name: GitHub context variable
        run: |
          echo "This is triggered by ${{ github.actor }}."
          echo "This commit sha is ${{ github.sha }}."
