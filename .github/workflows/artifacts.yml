name: artifacts-upload

on:
  push:
    branches:
     - main

jobs:
  artifacts-upload:
    runs-on: ubuntu-latest

    steps:
      - name: check out repo for latest code updates
        uses: actions/checkout@v4
      - name: create file 
        run: echo "hello-wrold" > file.txt
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: file.txt
    
