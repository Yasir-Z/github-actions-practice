name: env-secret

on:
  push:
    branches:
      - main

jobs:
  environment-secret:
    runs-on: ubuntu-latest
    steps:
      - name: pass secrets as env
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PW: ${{ secrets.DOCKER_TOKEN }}
        run: echo "My secret is ${{ secrets.DOCKER_USERNAME }}"
