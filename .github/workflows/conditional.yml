name: conditional-workflow

on:
  push:
    branches:
     - main

jobs:
  conditional-workflow:
    runs-on: ubuntu-latest
    steps:
      - name: run if banch is main. 
        id: main-branch
        if: github.ref_name == 'main'
        run: |
          echo "Simulating a failure on main branch..."
          exit 1

      - name: run on last step failure
        if: failure() && steps.main-branch.outcome == 'failure'
        run: echo "Last step failed that's why it runs"
